<!DOCTYPE html>

          <span class="lost-prompt">&gt;</span>
          <input id="lost-cmd" type="text" placeholder="help" maxlength="40" spellcheck="false">

      <a href="/" class="lost-map-btn">🗺 回到首页舞台</a>
