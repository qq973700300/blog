spring.application.name=blog

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/blog?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
spring.datasource.username=${DB_USER:blog}
spring.datasource.password=${DB_PASSWORD:blog123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# 健康检查：部署脚本与 systemd 用来判断「真的就绪」而非仅进程已启动
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# 视频上传：原片最大 500MB；≥50MB 压缩至 50MB 以下；<50MB 原片直存
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
server.tomcat.connection-timeout=600000
blog.upload.dir=${BLOG_UPLOAD_DIR:./data/uploads}
blog.ffmpeg.bin=${FFMPEG_BIN:ffmpeg}
blog.ffprobe.bin=${FFPROBE_BIN:ffprobe}
blog.video.transcode-timeout-minutes=45
blog.video.compress-queue-size=100
blog.video.compress-min-bytes=52428800
blog.video.compress-target-bytes=52428800

# 管理后台密码（生产环境请用环境变量 BLOG_ADMIN_PASSWORD）
blog.admin.password=${BLOG_ADMIN_PASSWORD:}
